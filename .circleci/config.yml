version: 2.1

orbs:
  node: circleci/node@5.2.0

executors:
  node-executor:
    docker:
      - image: cimg/node:22.0

jobs:
  lint:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run ESLint
          command: npm run lint

  typecheck:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run TypeScript Compiler
          command: npx tsc --noEmit

  build:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - restore_cache:
          name: Restore Next.js Build Cache
          keys:
            - next-build-cache-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - next-build-cache-{{ .Branch }}-
            - next-build-cache-
      - run:
          name: Build Next.js App
          command: npm run build
      - save_cache:
          name: Save Next.js Build Cache
          key: next-build-cache-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - .next/cache

workflows:
  ci-pipeline:
    jobs:
      - lint
      - typecheck
      - build:
          requires:
            - lint
            - typecheck

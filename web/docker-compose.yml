version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auraflow-postgres
    environment:
      POSTGRES_DB: auraflow
      POSTGRES_USER: ${POSTGRES_USER:-auraflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auraflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auraflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  minio:
    image: minio/minio:latest
    container_name: auraflow-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-auraflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-auraflow} $${MINIO_ROOT_PASSWORD:-changeme123};
        mc mb --ignore-existing local/auraflow-images;
        mc mb --ignore-existing local/auraflow-video;
        mc mb --ignore-existing local/auraflow-audio;
        mc mb --ignore-existing local/auraflow-text;
        echo 'Buckets ready';
      "

  # ── Orchestrator ─────────────────────────────────────────────
  orchestrator:
    build: ./agents/orchestrator
    container_name: auraflow-orchestrator
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-auraflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/auraflow
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-auraflow}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Web Frontend ─────────────────────────────────────────────
  web:
    build: ./apps/web
    container_name: auraflow-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on: [orchestrator]

volumes:
  postgres-data:
  redis-data:
  minio-data:

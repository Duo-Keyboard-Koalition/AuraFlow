version: '3.8'
services:
  minio:
    image: minio/minio:latest
    container_name: auraflow-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-auraflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # One-shot bucket creator
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-auraflow} $${MINIO_ROOT_PASSWORD:-changeme123};
        mc mb --ignore-existing local/auraflow-images;
        mc mb --ignore-existing local/auraflow-video;
        mc mb --ignore-existing local/auraflow-audio;
        mc mb --ignore-existing local/auraflow-text;
        mc anonymous set public local/auraflow-images;
        echo 'Buckets ready';
      "

volumes:
  minio-data:
